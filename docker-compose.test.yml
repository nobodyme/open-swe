# Ephemeral Postgres for contract tests and (Phase 1) agent_runtime tests.
# Started by tests/support/postgres.py when TEST_POSTGRES_DSN is not set:
#   docker compose -f docker-compose.test.yml up -d --wait
# Data is tmpfs-backed: nothing survives `down`.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openswe
      POSTGRES_PASSWORD: openswe
      POSTGRES_DB: openswe_test
    ports:
      - "54329:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openswe -d openswe_test"]
      interval: 1s
      timeout: 3s
      retries: 30
